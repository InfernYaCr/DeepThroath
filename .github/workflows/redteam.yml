name: LLM Red Team Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'config/targets.yaml'
      - 'config/attack_config.yaml'
      - 'src/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: 'Target profile name from targets.yaml'
        default: 'default'
      simulations:
        description: 'Simulations per attack'
        default: '25'

jobs:
  red-team:
    name: Red Team Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run red team scan
        id: scan
        run: |
          python scripts/run_redteam.py \
            --config config/attack_config.yaml \
            --targets config/targets.yaml \
            --target ${{ github.event.inputs.target || 'default' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-results-${{ github.run_number }}
          path: results/
          retention-days: 90

      - name: Post PR summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ job.status }}' === 'success' ? '✅ PASS' : '❌ FAIL';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 Red Team Scan — ${status}\n\nScan completed on run #${{ github.run_number }}.\nDownload full results from [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            });
